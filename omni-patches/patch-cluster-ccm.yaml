cluster:
  inlineManifests:
    - name: scaleway-ccm-rbac
      contents: |
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: cloud-controller-manager
          namespace: kube-system
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: system:cloud-controller-manager
          annotations:
            rbac.authorization.kubernetes.io/autoupdate: "true"
        rules:
        - apiGroups: ["coordination.k8s.io"]
          resources: ["leases"]
          verbs: ["get", "create", "update"]
        - apiGroups: [""]
          resources: ["events"]
          verbs: ["create", "patch", "update"]
        - apiGroups: [""]
          resources: ["nodes"]
          verbs: ["*"]
        - apiGroups: [""]
          resources: ["nodes/status"]
          verbs: ["patch"]
        - apiGroups: [""]
          resources: ["services"]
          verbs: ["list", "patch", "update", "watch"]
        - apiGroups: [""]
          resources: ["services/status"]
          verbs: ["list", "patch", "update", "watch"]
        - apiGroups: [""]
          resources: ["serviceaccounts"]
          verbs: ["create"]
        - apiGroups: [""]
          resources: ["persistentvolumes"]
          verbs: ["get", "list", "update", "watch"]
        - apiGroups: [""]
          resources: ["endpoints"]
          verbs: ["create", "get", "list", "watch", "update"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: system:cloud-controller-manager
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: system:cloud-controller-manager
        subjects:
        - kind: ServiceAccount
          name: cloud-controller-manager
          namespace: kube-system
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: system:cloud-controller-manager
          namespace: kube-system
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: extension-apiserver-authentication-reader
        subjects:
        - kind: ServiceAccount
          name: cloud-controller-manager
          namespace: kube-system

    - name: scaleway-ccm-secret
      contents: |
        apiVersion: v1
        kind: Secret
        metadata:
          name: scaleway-secret
          namespace: kube-system
        stringData:
          SCW_ACCESS_KEY: "YOUR_ACCESS_KEY"
          SCW_SECRET_KEY: "YOUR_SECRET_KEY"
          SCW_DEFAULT_PROJECT_ID: "YOUR_PROJECT_ID"
          SCW_DEFAULT_REGION: "fr-par"
          SCW_DEFAULT_ZONE: "fr-par-1"

    - name: scaleway-ccm
      contents: |
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: scaleway-ccm
          namespace: kube-system
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: scaleway-ccm
          template:
            metadata:
              labels:
                app: scaleway-ccm
            spec:
              dnsPolicy: Default
              hostNetwork: true
              serviceAccountName: cloud-controller-manager
              tolerations:
              - key: node.cloudprovider.kubernetes.io/uninitialized
                value: "true"
                effect: NoSchedule
              - key: CriticalAddonsOnly
                operator: Exists
              - key: node-role.kubernetes.io/master
                effect: NoSchedule
              containers:
              - name: scaleway-ccm
                image: scaleway/scaleway-cloud-controller-manager:latest
                imagePullPolicy: Always
                args:
                - --cloud-provider=scaleway
                - --leader-elect=true
                - --allow-untagged-cloud
                resources:
                  requests:
                    cpu: 100m
                    memory: 50Mi
                envFrom:
                - secretRef:
                    name: scaleway-secret
