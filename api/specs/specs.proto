syntax = "proto3";
package scwspecs;

option go_package = "github.com/siderolabs/omni-infra-provider-scaleway/api/specs";

// MachineSpec is stored in Omni in the infra provisioner state.
message MachineSpec {
  string server_id     = 1;
  string schematic     = 2;
  string talos_version = 3;
  string zone          = 4;
}
