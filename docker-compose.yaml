services:
  omni-infra-provider-scaleway:
    image: ghcr.io/coler-e/omni-infra-provider-scaleway:latest
    environment:
      - SCW_ACCESS_KEY=${SCW_ACCESS_KEY}
      - SCW_SECRET_KEY=${SCW_SECRET_KEY}
      - SCW_DEFAULT_PROJECT_ID=${SCW_DEFAULT_PROJECT_ID}
      - SCW_DEFAULT_ZONE=${SCW_DEFAULT_ZONE:-fr-par-1}
      - PROVIDER_ID=${PROVIDER_ID:-scaleway}
      - OMNI_ENDPOINT=${OMNI_ENDPOINT}
      - OMNI_SERVICE_ACCOUNT_KEY=${OMNI_SERVICE_ACCOUNT_KEY}
    restart: unless-stopped
